---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fluentbit-testing
  namespace: fluentbit
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         1
        Log_Level     info
        Daemon        off
        Parsers_File  parsers.conf
        HTTP_Server   On
        HTTP_Listen   0.0.0.0
        HTTP_Port     2020
        storage.path  /var/log/flb-storage-testing/
        storage.sync  normal
        storage.backlog.mem_limit 32MB
    @INCLUDE input-kubernetes.conf
    @INCLUDE output.conf
  output.conf: |
    [OUTPUT]
        Name            azure
        Match           kube.var.log.containers.loderunner*.*
        Customer_ID     ${WORKSPACE_ID}
        Shared_Key      ${SHARED_KEY}
        Log_Type        ${LODE_LOG}
        storage.total_limit_size  15M
    [OUTPUT]
        Name            azure
        Match           kube.var.log.containers.ngsa*_ngsa*
        Customer_ID     ${WORKSPACE_ID}
        Shared_Key      ${SHARED_KEY}
        Log_Type        ${NGSA_LOG}
        storage.total_limit_size  15M
    [OUTPUT]
        Name            azure
        Match           kube.var.log.containers.ngsa*_istio-proxy*
        Customer_ID     ${WORKSPACE_ID}
        Shared_Key      ${SHARED_KEY}
        Log_Type        ${ISTIO_LOG}
        storage.total_limit_size  15M
    [OUTPUT]
        Name            azure
        Match           kube.var.log.containers.istio-ingressgateway*istio-system_istio-proxy*
        Customer_ID     ${WORKSPACE_ID}
        Shared_Key      ${SHARED_KEY}
        Log_Type        ${ISTIO_LOG}
        storage.total_limit_size  15M
  input-kubernetes.conf: |
    [INPUT]
        Name              tail
        Tag               kube.*
        Path              /var/log/containers/*.log
        Parser            cri
        DB                /var/log/flb_kube-testing.db
        Mem_Buf_Limit     32MB
        Skip_Long_Lines   Off
        Refresh_Interval  10
        storage.type      filesystem
  parsers.conf: |
    [PARSER]
        Name         json
        Format       json
        Time_Key     time
        Time_Format  %d/%b/%Y:%H:%M:%S %z
        Time_Keep    Off
    [PARSER]
        Name         syslog
        Format       regex
        Regex        ^\<(?<pri>[0-9]+)\>(?<time>[^ ]* {1,2}[^ ]* [^ ]*) (?<host>[^ ]*) (?<ident>[a-zA-Z0-9_\/\.\-]*)(?:\[(?<pid>[0-9]+)\])?(?:[^\:]*\:)? *(?<message>.*)$
        Time_Key     time
        Time_Format  %b %d %H:%M:%S
    [PARSER]
        Name         cri
        Format       regex
        Regex        ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<log>.*)$
        Time_Key     time
        Time_Format  %Y-%m-%dT%H:%M:%S.%L%z
    [PARSER]
        Name         docker
        Format       json
        Time_Key     time
        Time_Format  %Y-%m-%dT%H:%M:%S.%L
        Time_Keep    Off
